# dock.yaml — Contrato de configuração para Everlast Pipeline
# Projeto: figma-landing-test (frontend estático)
#
# Ref: https://docktech.atlassian.net/wiki/spaces/APE/pages/3662938159/Template+dock.yaml
# Fluxo: Jenkins (Everlast Build) → CI (lint, test, build)
#         Argo (Everlast Deploy) → CD (deploy estáticos no CloudFront/S3)
#
# Branches Gitflow: master, release/*, develop, feature/*, hotfix/*

name: figma-landing-test
squad: design-system
tribe: APE
tower: platform
version: "0.0.1"
language: node
buildType: npm
languageVersion: "18"
pipelineType: "DEFAULT"
harnessGen: "first"
cloudProvider: "AWS"
deploymentType: "FrontendAwsCloudFront"
deploymentStrategy: "rolling"
channel: "#dock-ds-frontend"

# Pasta source e testes
appSrcFolder: "src/"
appTestFolder: "src/utils/__tests__"

# Package — artefato gerado pelo build (estáticos para S3)
package:
  type: "s3"

# Path dos estáticos para sync no bucket CloudFront
frontEndPathStatics: "dist/"
# frontEndBucketName: "" # Deixar vazio = pipeline cria automaticamente (<name>-<env>)

# ──────────────────────────────────────────────────────────────────────────
# ⚠️ AÇÃO NECESSÁRIA — Time APE/DevOps deve preencher os valores abaixo
# antes do primeiro deploy em cada ambiente.
# Campos obrigatórios para CD na AWS: accountName, accountId
# Campos opcionais para FrontendAwsCloudFront: clusterName, clusterNamespace
# ──────────────────────────────────────────────────────────────────────────
envs:
  dev:
    autoApproveDeploy: true
    accountName: ""   # TODO: preencher — ex: "dock-dev"
    accountId: ""     # TODO: preencher — ex: "123456789012"

  qa:
    autoSkipDeploy: true
    accountName: ""   # TODO: preencher
    accountId: ""     # TODO: preencher

  hml:
    autoApproveDeploy: false
    accountName: ""   # TODO: preencher
    accountId: ""     # TODO: preencher

  prd:
    autoApproveDeploy: false
    accountName: ""   # TODO: preencher
    accountId: ""     # TODO: preencher
    region: ""        # TODO: preencher — ex: "sa-east-1"
